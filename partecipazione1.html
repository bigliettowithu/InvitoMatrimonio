.ribbon {
  position: absolute;
  top: 0;
  left: 0;
  transform: translateX(-50%);
  width: 44px;
  height: 100%;
  z-index: 20;
  pointer-events: none;
}

/* NASTRI */
.ribbon::before,
.ribbon::after {
  content: "";
  position: absolute;
  top: 0;
  width: 20px;
  height: 100%;

 background: linear-gradient(
  to bottom,
  #f7f2ea 0%,
  #eadfcd 18%,
  #d8c3a1 45%,
  #eadfcd 70%,
  #cdb089 100%
);


  box-shadow:
    inset 0 2px 6px rgba(255,255,255,0.25),
    inset 0 -6px 10px rgba(0,0,0,0.35),
    0 4px 10px rgba(0,0,0,0.18);
}

/* piega nastro sinistro */
.ribbon::before {
  left: 2px;
  transform: rotate(-2deg);
}

/* piega nastro destro */
.ribbon::after {
  left: -2px;
  transform: rotate(2deg);
}

  #openBtn {

/* IMMAGINE INTEGRATA */
.canvas img{
  width:100%;

  /* fade ai bordi */
  -webkit-mask-image: radial-gradient(
    circle at center,
    rgba(0,0,0,1) 55%,
    rgba(0,0,0,0.6) 75%,
    rgba(0,0,0,0) 100%
  );

  mask-image: radial-gradient(
    circle at center,
    rgba(0,0,0,1) 55%,
    rgba(0,0,0,0.6) 75%,
    rgba(0,0,0,0) 100%
  );
}

.canvas::after{
  content:"";
  position:absolute;
  inset:0;
  pointer-events:none;

  background:
    radial-gradient(circle at 30% 20%, rgba(255,255,255,0.25), transparent 60%),
    radial-gradient(circle at 70% 80%, rgba(0,0,0,0.18), transparent 60%),

    /* effetto carta stampata */

}

.top-image img{

      radial-gradient(circle at 20% 85%, black 0 60%, transparent 80%),
      radial-gradient(circle at 80% 80%, black 0 55%, transparent 75%),

  <script>
    // blocca menu tasto destro
    document.addEventListener("contextmenu", e => e.preventDefault());

    // testo temporaneo su click
    document.addEventListener("DOMContentLoaded", function() {
      const area = document.getElementById("click-area");
      const corpo = document.getElementById("corpo");
      const tempText = document.getElementById("temporary-text");

      area.addEventListener("click", function() {
        corpo.style.display = "none";
        tempText.style.display = "block";

        setTimeout(() => {
          tempText.style.display = "none";
          corpo.style.display = "block";
        }, 9000);
      });
    });

    // animazione apertura libro
    const book = document.querySelector(".book");
    const btn = document.getElementById("openBtn");
    const leftPage = document.querySelector(".page.left");
    const rightPage = document.querySelector(".page.right");

    btn.addEventListener("click", () => {
  rightPage.style.transform = "rotateY(120deg)";
  setTimeout(() => {
    leftPage.style.transform = "rotateY(-120deg)";
  }, 500);

  setTimeout(() => {
    // salva lo stato
    localStorage.setItem("invitoAperto", "true");

    book.remove();
  }, 5000);
});

  </script>
