<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>RSVP Matrimonio</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: 'Playfair Display', serif;
  background: transparent;
}

/* CONTAINER PRINCIPALE */
.stage {
  position: fixed;
  inset: 0;
  overflow: hidden;
}

/* SFONDO */
.bg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: 0;
  pointer-events: none;
  user-select: none;
}

 .action-buttons{
  display:flex;
  flex-direction:row;
  justify-content:center;   /* 👈 QUESTO è quello che ti manca */
  align-items:center;
  gap:20px;

  width:100%;
  margin-top:30px;
}
.action-btn{
  width:52px;
  height:52px;
  border-radius:12px;
  background:#F8F5F0;
  border:1px solid #D6C3A5;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#6B5D54;
  box-shadow:0 6px 16px rgba(0,0,0,0.10);
}

/* OVERLAY CONTENUTO */
    .rsvp-overlay{
      position:absolute;
      top:50%;
      left:50%;
      transform:translate(-50%, -50%);
      width:min(900px, 92vw);
      padding:20px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      z-index:2;
    }

/* BOX CONTENUTO */
.rsvp-step1 {
  max-width: 620px;
}

/* INPUT */
.rsvp-step1 input{
  width: 100%;
  margin: 8px 0;
  padding: 6px 8px;
  border: none;
  border-bottom: 1px solid #6B5D54;
  background: transparent;
  color: #6B5D54;
  font-size: 2em;
}

.rsvp-step1 label{
  width: 100%;
  margin: 8px 0;
  padding: 6px 8px;
  border: none;
  background: transparent;
  color: #6B5D54;
  font-size: 3em;
}

/* BOTTONI */
.rsvp-step1 button,
.rsvp-step2 button {
  padding: 8px 20px;
  margin: 5px;
  border: 1px solid #6B5D54;
  background: transparent;
  color: #6B5D54;
  cursor: pointer;
}

/* STEP 2 (se lo usi dopo) */
.rsvp-step2 {
  display: none;
}
</style>
</head>

<body>

<div class="stage">

  <!-- SFONDO -->
  <img class="bg" src="sfondo1.jpg" alt="Sfondo invito">

  <!-- CONTENUTO SOPRA -->
  <div class="rsvp-overlay">

    <div class="rsvp-step1">

      <label>
        La vostra presenza sarà il dono più prezioso per noi
      </label>

      <div class="iban-container" style="margin-top:15px;">
        <input type="text" id="ibanField"
               value="IT00X0000000000000000000000"
               readonly>

        <button type="button" onclick="copyIBAN()">
          Copia IBAN
        </button>
      </div>

    </div>
 <div class="action-buttons">
          <a href="index.html" class="action-btn" aria-label="Torna indietro">
            <i class="fa-solid fa-arrow-left"></i>
          </a>
        </div>
  </div>
   

</div>

<script>
function copyIBAN() {
  const iban = document.getElementById("ibanField");
  iban.select();
  iban.setSelectionRange(0, 99999);

  navigator.clipboard.writeText(iban.value)
    .then(() => alert("IBAN copiato negli appunti!"))
    .catch(() => alert("Impossibile copiare l'IBAN."));
}
</script>

</body>
</html>
