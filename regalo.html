<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>RSVP Matrimonio</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@0;1&family=Great+Vibes&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
html, body{
  margin:0;
  padding:0;
  width:100vw;
  height:100vh;
  box-sizing:border-box;
  color:#6B5D54;
  overflow-x:hidden;
}

*, *::before, *::after{
  box-sizing:inherit;
  font-family:'Great Vibes';
}

/* STAGE */
.stage{
  position:relative;
  min-height:100vh;
}

/* SFONDO */
.bg{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:0;
  pointer-events:none;
  user-select:none;
}

/* CONTENITORE */
.a4{
  position:relative;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  min-height:100vh;
}

/* OVERLAY */
.rsvp-overlay{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:min(900px, 92vw);
  display:flex;
  flex-direction:column;
  align-items:center;
  z-index:2;
}

/* BOX */
.rsvp-step1{
  width:100%;
  background:rgba(255,255,255,0.45);
  backdrop-filter:blur(2px);
  border:1px solid rgba(0,0,0,0.15);
  border-radius:12px;
  padding:22px;
  text-align:center;
}

/* TESTO */
.message{
  display:block;
  font-size:clamp(18px, 2.6vh, 24px);
  line-height:1.6;
  color:#6B5D54;
}

.note{
  display:block;
  margin-top:10px;
  font-size:clamp(16px, 2.2vh, 20px);
  font-style:italic;
}

/* IBAN */
.iban-container{
    font-family: 'Cormorant Garamond', serif;
  margin-top:20px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
}

.iban-title{
  font-size:16px;
  font-weight:600;
  letter-spacing:1px;
    font-family: 'Cormorant Garamond', serif;
}

.iban-container input{
  width:100%;
  max-width:360px;
  text-align:center;
  padding:12px;
  border:1px solid rgba(107,93,84,0.4);
  background:rgba(255,255,255,0.3);
  border-radius:10px;
  font-size:18px;
  color:#6B5D54;
    font-family: 'Cormorant Garamond', serif;
}

.iban-subtitle{
  font-size:16px;
  opacity:0.85;
}

/* BUTTON */
.iban-container button{
  padding:10px 18px;
  border:1px solid #6B5D54;
  background:transparent;
  color:#6B5D54;
  border-radius:10px;
  cursor:pointer;
    font-family: 'Cormorant Garamond', serif;
}

/* HOME BUTTON */
.action-buttons{
  display:flex;
  justify-content:center;
  margin-top:25px;
}

.action-btn{
  width:52px;
  height:52px;
  border-radius:12px;
  background:#F8F5F0;
  border:1px solid #D6C3A5;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#6B5D54;
  box-shadow:0 6px 16px rgba(0,0,0,0.10);
}
</style>
</head>

<body>

<div class="stage">

  <img class="bg" src="sfondopartecipazione.jpg" alt="sfondo">

  <div class="a4">

    <div class="rsvp-overlay">

      <div class="rsvp-step1">

        <div class="message">
          La vostra presenza nel nostro grande giorno sarà per noi il pensiero più bello.<br><br>

          Se avete il piacere di farci un regalo, preferiamo conservarlo nel nostro salvadanaio.<br><br>

          <span class="note">
            E quando in futuro lo useremo penseremo con gioia a voi e al vostro gesto
          </span>
        </div>

        <div class="iban-container">

          <div class="iban-title">IBAN</div>

          <input type="text" id="ibanField"
                 value="IT75S0306903560100000006446"
                 readonly>

          <div class="iban-subtitle">
            Intestato a Manuele Messina
          </div>

          <button onclick="copyIBAN()">Copia IBAN</button>

        </div>

      </div>

      <a href="index.html" class="action-btn" aria-label="Torna indietro">
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
       stroke="currentColor" stroke-width="2"
       stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 10.5L12 3l9 7.5"></path>
    <path d="M5 10v10h5v-6h4v6h5V10"></path>
  </svg>
</a>

    </div>

  </div>

</div>

<script>
function copyIBAN(){
  const iban = document.getElementById("ibanField");
  iban.select();
  iban.setSelectionRange(0,99999);

  navigator.clipboard.writeText(iban.value)
    .then(()=>alert("IBAN copiato"))
    .catch(()=>alert("Errore copia"));
}
</script>

</body>
</html>
