<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Invito 30 anni</title>

  <!-- Font e icone -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@0;1&family=Great+Vibes&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    /* BASE */
    html, body{
      margin:0;
      padding:0;
      width:100vw;
      height:100vh;
      box-sizing:border-box;
      color:#6B5D54;
    }

    body {
  margin: 0;
  padding: 0;
  min-height: 100vh;
  overflow-x: hidden;
  background-attachment: scroll;
  background-size: 100% 50%;
background-image: url("ripeti.jpg");
  background-repeat: repeat;
    min-height: 100vh;
    margin: 0;
    display: flex;
    flex-direction: column;

}
    *, *::before, *::after{ box-sizing:inherit; }

    /* STAGE */
   .stage {
  position: relative;
  min-height: 100vh;
}

    /* SFONDO A TUTTA PAGINA */
    .bg{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:contain;
      object-position:top;
      z-index:0;
      pointer-events:none;
      user-select:none;
      -webkit-user-drag:none;
    }

    /* CONTENITORE SOPRA LO SFONDO */
.a4 {
  position: relative;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  margin-top: 400px;
}

    /* OVERLAY RSVP */
    .rsvp-overlay{
      position:absolute;
      top:50%;
      left:50%;
      transform:translate(-50%, -50%);
      width:min(900px, 92vw);
      padding:20px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      z-index:2;
    }

    .rsvp-step1{
      width:100%;
      background:rgba(255,255,255,0.45);
      backdrop-filter: blur(2px);
      border:1px solid rgba(0,0,0,0.15);
      border-radius:12px;
      padding:18px;
    }

    .rsvp-step1 input{
      width:100%;
      border:none;
      border-bottom:1px solid #6B5D54;
      background:transparent;
      padding:10px 0;
      font-size:clamp(18px, 3vh, 26px);
      margin-bottom:18px;
      color:#6B5D54;
      outline:none;
    }

    .rsvp-step1 div {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center; /* tutto centrato */
  gap: 20px;               /* spazio uniforme */
  flex-wrap: nowrap;       /* TUTTO SU UNA RIGA */
}

.rsvp-step1 label {
  font-size: clamp(18px, 2.6vh, 24px);
  font-weight: 600;
  white-space: nowrap; /* evita che vada a capo */
}
.rsvp-step1 button {
  width: 100px;              /* UGUALI */
  height: 50px;              /* UGUALI */
  border: 1px solid #6B5D54;
  background: transparent;
  color: #6B5D54;
  font-size: clamp(18px, 2.6vh, 22px);
  cursor: pointer;
  padding: 0;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
}


* {
  font-family: 'Great Vibes';
}
    .rsvp-step2{
      display:none;
      width:100%;
      margin-top:14px;
      text-align:left;
      background:rgba(255,255,255,0.45);
      backdrop-filter: blur(2px);
      border:1px solid rgba(0,0,0,0.15);
      border-radius:12px;
      padding:18px;
      font-size:clamp(16px, 2.6vh, 22px);
    }

       .rsvp-step-parteciperai{
      display:none;
      width:100%;
      margin-top:14px;
      text-align:left;
      background:rgba(255,255,255,0.45);
      backdrop-filter: blur(2px);
      border:1px solid rgba(0,0,0,0.15);
      border-radius:12px;
      padding:18px;
      font-size:clamp(16px, 2.6vh, 22px);
       align-items: center; /* tutto centrato */

    }


 .rsvp-step-parteciperai label{
      display:block;
      margin-bottom:8px;
      font-weight:600;
    }

    .rsvp-step-parteciperai input,
    .rsvp-step-parteciperai select,
    .rsvp-step-parteciperai textarea{
      font-size:clamp(16px, 2.6vh, 22px);
      width:100%;
      margin:8px 0;
      padding:8px 0;
      border:none;
      border-bottom:1px solid #6B5D54;
      background:transparent;
      color:#6B5D54;
      outline:none;
    }

    .rsvp-step-parteciperai button{
      margin-top:12px;
      padding:10px 22px;
      border:1px solid #6B5D54;
      background:transparent;
      color:#6B5D54;
      font-size:clamp(16px, 2.6vh, 22px);
      cursor:pointer;
      border-radius:10px;
    }

    .rsvp-step2 label{
      display:block;
      margin-bottom:8px;
      font-weight:600;
    }

    .rsvp-step2 input,
    .rsvp-step2 select,
    .rsvp-step2 textarea{
      font-size:clamp(16px, 2.6vh, 22px);
      width:100%;
      margin:8px 0;
      padding:8px 0;
      border:none;
      border-bottom:1px solid #6B5D54;
      background:transparent;
      color:#6B5D54;
      outline:none;
    }

    .rsvp-step2 button{
      margin-top:12px;
      padding:10px 22px;
      border:1px solid #6B5D54;
      background:transparent;
      color:#6B5D54;
      font-size:clamp(16px, 2.6vh, 22px);
      cursor:pointer;
      border-radius:10px;
    }

    /* PARTECIPANTI EXTRA */
    #extraFields{ margin-top:10px; }

    .partecipante{
      display:flex;
      align-items:center;
      gap:10px;
      border:1px solid #6B5D54;
      padding:8px;
      border-radius:10px;
      margin-bottom:10px;
      background:rgba(255,255,255,0.25);
    }

    .partecipante input{
      width:55%;
      border:none;
      border-bottom:1px solid #6B5D54;
      background:transparent;
      padding:6px 0;
      outline:none;
      font-size:clamp(14px, 2.2vh, 20px);
    }

    .partecipante select{
      width:35%;
      border:none;
      border-bottom:1px solid #6B5D54;
      background:transparent;
      padding:6px 0;
      outline:none;
      font-size:clamp(14px, 2.2vh, 20px);
    }

    .partecipante .remove-btn{
      background:transparent;
      border:none;
      font-size:28px;
      line-height:1;
      cursor:pointer;
      padding:0 6px;
    }

    /* BOTTONE INDIETRO */
 .action-buttons{
  display:flex;
  flex-direction:row;
  justify-content:center;   /* 👈 QUESTO è quello che ti manca */
  align-items:center;
  gap:20px;

  width:100%;
  margin-top:30px;
}

.action-btn{
  width:52px;
  height:52px;
  border-radius:12px;
  background:#F8F5F0;
  border:1px solid #D6C3A5;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#6B5D54;
  box-shadow:0 6px 16px rgba(0,0,0,0.10);
}

.buttons-row {
  display: flex;
  gap: 12px;
  justify-content: center;
  width: 100%;
}

.back-btn {
  align-self: flex-start; /* 👈 solo lui a sinistra */
  cursor: pointer;
  margin-top: 12px;
}
.step-title {
  font-size: 30px;
  font-weight: 600;
  margin-bottom: 12px;
  text-align: center;
  color: #6B5D54;
}

.top-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  flex-wrap: wrap; /* se schermo piccolo va a capo */
  text-align: center;
   align-items: baseline;
}
.buttonsconfirm {
  display: flex;
  justify-content: center;
  gap: 12px;
}

.same-text {
  font-size: 22px;   /* stessa dimensione */
  font-weight: 600;  /* stessa pesantezza */
  color: #6B5D54;
  padding: 0;
  margin: 0;
}

.actions {
  position: relative;
  width: 100%;
  display: flex;
  justify-content: center; /* centra Invio */
  align-items: center;
}

.back-btn2 {
  position: absolute;
  left: 0; /* forza sinistra */
  cursor: pointer;
}

.send-btn {
  padding: 10px 22px;
  border: 1px solid #6B5D54;
  background: transparent;
  color: #6B5D54;
  border-radius: 10px;
}
  </style>
</head>

<body>
  <div class="stage">
    <!-- SFONDO FULLSCREEN -->
    <img class="bg" src="sfondopartecipazione.jpg" alt="Sfondo invito" style=" object-fit:cover;">

    <!-- CONTENUTO SOPRA -->
    <div class="a4">
      <div class="rsvp-overlay">
        <div class="rsvp-step1">
           <div class="step-title">Inserisci i tuoi dati</div>
          <input type="text" id="rsvpName" placeholder="Nome" oninput="checkName()">
           <input type="text" id="rsvpCognome" placeholder="Cognome" oninput="checkName()">
          <div>
            <button id="okBtn" onclick="showStepParteciperai(true)">Continua</button>
          </div>
        </div>

        <div class="rsvp-step-parteciperai" id="rsvp-step-parteciperai">
          
          <div>
           <div class="top-row">
  <div id="nomeInserito" class="same-text"></div>
  <label class="same-text">parteciperai?</label>
</div>
             <div class="buttonsconfirm">
    <button id="yesBtn" onclick="showStep2(true)">Sì</button>
    <button id="noBtn" onclick="sendNo()">No</button>
  </div>
          </div>
          <div class="back-btn" onclick="goBackToStep1()">← Indietro</div>
        </div>

        <div class="rsvp-step2" id="step2">
          <label>Parteciperai da solo/a o in compagnia?</label>
          <select id="compagnia" onchange="toggleExtra()">
            <option value="solo">Solo/a</option>
            <option value="compagnia">In compagnia</option>
          </select>

          <div id="extraFields" style="display:none;">
            <div id="partecipantiContainer"></div>
            <button type="button" onclick="addPartecipante()">Aggiungi partecipante</button>
          </div>
         <div class="actions">
  <div class="back-btn2" onclick="goBackToStepParteciperai()">← Indietro</div>
  <button class="send-btn" onclick="sendYes()">Invia</button>
</div>
        </div>

       <a href="index.html" class="action-btn" aria-label="Torna indietro">
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
       stroke="currentColor" stroke-width="2"
       stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 10.5L12 3l9 7.5"></path>
    <path d="M5 10v10h5v-6h4v6h5V10"></path>
  </svg>
</a>
      </div>
    </div>

    <!-- LOGO -->
   
  </div>

  <script>
    function checkName(){
      const name = document.getElementById("rsvpName").value.trim();
      const yes = document.getElementById("yesBtn");
      const no = document.getElementById("noBtn");
      if(name.length>0){
        yes.classList.add("enabled");
        no.classList.add("enabled");
      } else {
        yes.classList.remove("enabled");
        no.classList.remove("enabled");
      }
    }


  function showStepParteciperai(isYes){
    const name = document.getElementById("rsvpName").value.trim();
     const cognome = document.getElementById("rsvpCognome").value.trim();
    if(!name || !cognome){ alert("Inserisci Nome e Cognome"); return; }
    document.getElementById("nomeInserito").textContent = name;
  if(isYes){
    document.getElementById("rsvp-step-parteciperai").style.display = "block";
  } else {
    sendNo();
  }

  document.querySelector(".rsvp-step1").style.display = "none";
}

    function showStep2(isYes){
      const name = document.getElementById("rsvpName").value.trim();
      if(isYes){
        document.getElementById("step2").style.display="block";
      } else {
        sendNo();
      }

      document.querySelector(".rsvp-step-parteciperai").style.display="none";
    }

    function toggleExtra(){
      const val = document.getElementById("compagnia").value;
      document.getElementById("extraFields").style.display = (val==="compagnia") ? "block" : "none";
    }

    function addPartecipante(){
      const container = document.getElementById("partecipantiContainer");
      const div = document.createElement("div");
      div.classList.add("partecipante");

      div.innerHTML = `
        <input type="text" placeholder="Nome Cognome">
        <select>
          <option value="adulto">Adulto/a</option>
          <option value="bimbo03">Bambino/a 0-3</option>
          <option value="bimbo03">Bambino/a 3-10</option>
          <option value="bimbo3plus">Bambino/a 10+</option>
        </select>
        <button type="button" class="remove-btn" onclick="this.parentElement.remove()">×</button>
      `;

      container.appendChild(div);
    }

    function sendNo(){
      const name = document.getElementById("rsvpName").value.trim();
      if(!name){ alert("Inserisci Nome e Cognome"); return; }
      const msg = `Ciao! Sono ${name} e purtroppo non potrò partecipare al matrimonio 💌`;
      window.open("https://wa.me/393892043551?text="+encodeURIComponent(msg), "_blank");
    }

    function sendYes(){
      const name = document.getElementById("rsvpName").value.trim();
      if(!name){ alert("Inserisci Nome e Cognome"); return; }

      const extraElems = document.querySelectorAll("#partecipantiContainer .partecipante");
      let extraMsg = "";

      extraElems.forEach(el => {
        const n = el.querySelector("input").value.trim();
        const t = el.querySelector("select").value;
        if(n) extraMsg += `${n} (${t})\n`;
      });

      const msg = `Conferma partecipazione matrimonio 💍
Nome: ${name}
Partecipanti aggiuntivi:
${extraMsg}`;

      window.open("https://wa.me/393892043551?text="+encodeURIComponent(msg), "_blank");
    }
 
    function goBackToStep1() {
  document.querySelector(".rsvp-step-parteciperai").style.display = "none";
  document.querySelector(".rsvp-step1").style.display = "block";
}

function goBackToStepParteciperai() {
  document.getElementById("step2").style.display = "none";
  document.querySelector(".rsvp-step-parteciperai").style.display = "block";
}
 </script>
</body>
</html>
