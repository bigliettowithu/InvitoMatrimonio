.ribbon {
  position: absolute;
  top: 0;
  left: 0;
  transform: translateX(-50%);
  width: 44px;
  height: 100%;
  z-index: 20;
  pointer-events: none;
}

/* NASTRI */
.ribbon::before,
.ribbon::after {
  content: "";
  position: absolute;
  top: 0;
  width: 20px;
  height: 100%;

 background: linear-gradient(
  to bottom,
  #f7f2ea 0%,
  #eadfcd 18%,
  #d8c3a1 45%,
  #eadfcd 70%,
  #cdb089 100%
);


  box-shadow:
    inset 0 2px 6px rgba(255,255,255,0.25),
    inset 0 -6px 10px rgba(0,0,0,0.35),
    0 4px 10px rgba(0,0,0,0.18);
}

/* piega nastro sinistro */
.ribbon::before {
  left: 2px;
  transform: rotate(-2deg);
}

/* piega nastro destro */
.ribbon::after {
  left: -2px;
  transform: rotate(2deg);
}

  <script>
    // blocca menu tasto destro
    document.addEventListener("contextmenu", e => e.preventDefault());
    // testo temporaneo su click
    document.addEventListener("DOMContentLoaded", function() {
      const area = document.getElementById("click-area");
      const corpo = document.getElementById("corpo");
      const tempText = document.getElementById("temporary-text");

      area.addEventListener("click", function() {
        corpo.style.display = "none";
        tempText.style.display = "block";

        setTimeout(() => {
          tempText.style.display = "none";
          corpo.style.display = "block";
        }, 9000);
      });
    });

    const book = document.querySelector(".book");
    const btn = document.getElementById("openBtn");
    const leftPage = document.querySelector(".page.left");
    const rightPage = document.querySelector(".page.right");

    const opened = localStorage.getItem("invitoAperto") === "true";
    const time = localStorage.getItem("invitoApertoTime");

    const TEN_MIN = 10 * 60 * 1000;

    if (opened && time) {
    // salta effetto libro
    book.style.display = "none";
    document.body.classList.remove("locked");
    document.body.classList.add("unlocked");

    a4.style.opacity = "1";
    a4.style.pointerEvents = "auto";
    }
   btn.addEventListener("click", () => {
   document.body.classList.remove("locked");

  rightPage.style.transform = "rotateY(120deg)";

  setTimeout(() => {
    leftPage.style.transform = "rotateY(-120deg)";
  }, 500);

  setTimeout(() => {
    localStorage.setItem("invitoAperto", "true");
    localStorage.setItem("invitoApertoTime", Date.now());
    book.style.display = "none"; 
  }, 5000);
});
